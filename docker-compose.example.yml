# Copy to docker-compose.yml and edit the volume paths + user for your DSM.
services:
  raw-sorter:
    image: ghcr.io/t0saki/raw-sorter:latest
    container_name: raw-sorter
    restart: unless-stopped

    # IMPORTANT: pick a uid:gid that can READ the input share and WRITE the album + archive shares.
    # On DSM, find a user's uid with:  `id <username>`  (the `users` group is gid 100).
    user: "1026:100"

    # The in-container paths default to /input, /album, /archive — just mount to them below.
    # Everything in `environment` is optional; the defaults are shown.
    environment:
      # --- encoding ---
      FORMAT: heif          # heif | avif
      QUALITY: "50"         # 0-100
      PRESET: slow          # x265 preset; use medium/fast if your NAS CPU is weak
      CHROMA: "420"
      COLOR: srgb           # srgb (convert wide-gamut for compatibility) | preserve

      # --- video ---
      VIDEO: transcode      # transcode (1080p HEVC/AAC to album) | copy | ignore
      VIDEO_CRF: "30"       # x265 quality; higher = smaller
      VIDEO_PRESET: fast    # use faster/ultrafast if your NAS CPU is weak
      VIDEO_BITDEPTH: "10"  # 10 (Main10, efficient) | 8 (old-hardware compatibility)
      VIDEO_ACODEC: aac     # aac (max MP4 compatibility) | copy
      VIDEO_DISPOSITION: archive  # archive original beside the photos | delete

      # --- behaviour ---
      WORKERS: "1"          # parallel encodes; keep low on a NAS
      SETTLE_SECONDS: "10"
      RESCAN_INTERVAL: 5m
      JPG_DISPOSITION: archive   # archive (keep original JPG beside RAW) | delete
      RAW_WITHOUT_JPG: preview   # preview | archive | skip
      LOG_LEVEL: info

    volumes:
      - /volume1/photo/incoming:/input        # camera card dump (RAW + JPG + video)
      - /volume1/photo/Album:/album           # a Synology Photos / synced folder (HEIF + 1080p MP4)
      - /volume1/cold/raw-archive:/archive    # cold storage for RAW + video masters
